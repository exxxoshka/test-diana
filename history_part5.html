const container = document.getElementById('questions-container');
const userAnswers = {};
const questionStates = {};

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function renderQuestions() {
    container.innerHTML = '';
    questions.forEach((item, idx) => {
        const opts = item.opts.map((o, oi) => ({ text: o, origIdx: oi }));
        const origCorrect = item.ans;
        shuffleArray(opts);
        const newCorrect = opts.findIndex(o => o.origIdx === origCorrect);
        const letters = 'abcd'.split('');

        const block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q-block-' + idx;
        block.dataset.correct = JSON.stringify(newCorrect);
        block.innerHTML = `
            <div class="q-text"><span class="q-num">${idx + 801}.</span>${item.q}</div>
            <div class="options">
                ${opts.map((o, oi) => `
                    <label class="option" data-q="${idx}" data-o="${oi}">
                        <input type="radio" name="q${idx}" value="${oi}">
                        <span class="option-letter">${letters[oi]}</span>
                        <span class="option-text">${o.text}</span>
                    </label>
                `).join('')}
            </div>
            <div class="feedback" id="fb-${idx}"></div>
        `;
        container.appendChild(block);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function(e) {
            const qIdx = parseInt(this.dataset.q);
            const oIdx = parseInt(this.dataset.o);
            const block = document.getElementById('q-block-' + qIdx);
            const correctAns = JSON.parse(block.dataset.correct);

            block.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            this.querySelector('input').checked = true;

            userAnswers[qIdx] = oIdx;
            checkSingleQuestion(qIdx, block, correctAns);
        });
    });
}

function checkSingleQuestion(idx, block, correctAns) {
    const fb = document.getElementById('fb-' + idx);
    block.querySelectorAll('.option').forEach(o => o.classList.remove('correct-highlight'));

    if (userAnswers[idx] === undefined) {
        fb.classList.remove('show', 'correct-fb', 'incorrect-fb');
        block.classList.remove('correct', 'incorrect');
        questionStates[idx] = 'unanswered';
    } else if (userAnswers[idx] === correctAns) {
        fb.textContent = '✅ Правильно!';
        fb.className = 'feedback show correct-fb';
        block.classList.add('correct');
        block.classList.remove('incorrect');
        questionStates[idx] = 'correct';
    } else {
        fb.textContent = '❌ Неправильно. Правильный ответ выделен зелёным.';
        fb.className = 'feedback show incorrect-fb';
        block.classList.add('incorrect');
        block.classList.remove('correct');
        questionStates[idx] = 'incorrect';
        const optEl = block.querySelector(`.option[data-o="${correctAns}"]`);
        if (optEl) optEl.classList.add('correct-highlight');
    }

    updateGlobalScore();
}

function updateGlobalScore() {
    const total = questions.length;
    let correct = 0;
    for (let i = 0; i < total; i++) {
        if (questionStates[i] === 'correct') correct++;
    }
    document.getElementById('global-result').textContent =
        `Результат: ${correct} из ${total} (${Math.round(correct/total*100)}%)`;
}

function resetAll() {
    for (const key in userAnswers) delete userAnswers[key];
    for (const key in questionStates) delete questionStates[key];
    document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.checked = false;
    });
    document.querySelectorAll('.option').forEach(o => {
        o.classList.remove('selected', 'correct-highlight');
    });
    document.querySelectorAll('.question-block').forEach(b => b.classList.remove('correct', 'incorrect'));
    document.querySelectorAll('.feedback').forEach(f => f.className = 'feedback');
    updateGlobalScore();
}

renderQuestions();
</script>
</body>
</html>
