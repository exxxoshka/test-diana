<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История — Часть 1 (работа над ошибками)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Светлая тема */
        :root {
            --bg-body: #f0f4f8;
            --text-color: #2d3748;
            --card-bg: #ffffff;
            --card-border: #d69e2e;
            --correct-bg: #f0fff4;
            --incorrect-bg: #fff5f5;
            --option-bg: #fafafa;
            --option-border: #e2e8f0;
            --option-hover: #fffbeb;
            --letter-bg: #edf2f7;
            --letter-color: #4a5568;
            --selected-letter: #fff;
            --result-bg: #fff3cd;
            --nav-bg: #1a365d;
            --btn-reset: #e2e8f0;
            --btn-reset-color: #4a5568;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        /* Тёмная тема */
        body.dark {
            --bg-body: #121212;
            --text-color: #e2e8f0;
            --card-bg: #1e293b;
            --card-border: #fbbf24;
            --correct-bg: #064e3b;
            --incorrect-bg: #7f1a1a;
            --option-bg: #334155;
            --option-border: #475569;
            --option-hover: #3b4a6e;
            --letter-bg: #475569;
            --letter-color: #cbd5e0;
            --selected-letter: #1e293b;
            --result-bg: #2d3748;
            --nav-bg: #0f172a;
            --btn-reset: #334155;
            --btn-reset-color: #cbd5e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        
        .top-nav {
            background: var(--nav-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 10px;
            transition: background 0.3s;
        }
        
        .top-nav .nav-links {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .top-nav a, .top-nav span {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            color: #fff;
            background: #2b6cb0;
            transition: 0.2s;
        }
        
        .top-nav a:hover {
            background: #3182ce;
        }
        
        .top-nav span.active {
            background: #d69e2e;
            cursor: default;
        }
        
        .top-nav .home-btn {
            background: #e53e3e;
            font-weight: 700;
        }
        
        .top-nav .home-btn:hover {
            background: #c53030;
        }
        
        .theme-toggle {
            background: #4a5568;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: white;
            transition: 0.2s;
        }
        
        .theme-toggle:hover {
            background: #2d3748;
            transform: scale(1.02);
        }
        
        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: var(--card-border);
            margin: 20px 0 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: var(--btn-reset);
            color: var(--btn-reset-color);
            transition: 0.2s;
        }
        
        .mode-btn.active {
            background: var(--card-border);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .mode-btn:hover:not(.active) {
            filter: brightness(0.9);
            transform: scale(1.02);
        }
        
        .question-block {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--card-border);
            transition: 0.3s;
        }
        
        .question-block.correct {
            border-left-color: #38a169;
            background: var(--correct-bg);
        }
        
        .question-block.incorrect {
            border-left-color: #c53030;
            background: var(--incorrect-bg);
        }
        
        .q-num {
            font-weight: 700;
            color: var(--card-border);
            margin-right: 8px;
        }
        
        .q-text {
            font-weight: 500;
            margin-bottom: 14px;
            font-size: 16px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 2px solid var(--option-border);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--option-bg);
        }
        
        .option:hover {
            border-color: var(--card-border);
            background: var(--option-hover);
        }
        
        .option input[type="radio"] {
            display: none;
        }
        
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--letter-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--letter-color);
            flex-shrink: 0;
            transition: 0.2s;
        }
        
        .option.selected .option-letter {
            background: var(--card-border);
            color: var(--selected-letter);
        }
        
        .option.correct-highlight {
            border-color: #38a169;
            background: #064e3b80;
        }
        
        .option.correct-highlight .option-letter {
            background: #38a169;
            color: #fff;
        }
        
        .feedback {
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            display: none;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct-fb {
            background: #38a16940;
            color: #2ecc71;
            border-left: 3px solid #2ecc71;
        }
        
        body.dark .feedback.correct-fb {
            background: #064e3b;
            color: #86efac;
        }
        
        .feedback.incorrect-fb {
            background: #c5303040;
            color: #e53e3e;
            border-left: 3px solid #e53e3e;
        }
        
        body.dark .feedback.incorrect-fb {
            background: #7f1a1a;
            color: #f87171;
        }
        
        .btn-group {
            text-align: center;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        
        .btn-reset {
            background: var(--btn-reset);
            color: var(--btn-reset-color);
        }
        
        .btn-reset:hover {
            filter: brightness(0.9);
        }
        
        .result {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0;
            background: var(--result-bg);
            padding: 16px;
            border-radius: 16px;
            transition: background 0.3s;
        }
        
        .empty-mistakes {
            background: #064e3b80;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            margin: 20px 0;
        }
        
        body.dark .empty-mistakes {
            background: #1e293b;
        }
        
        .info-placeholder {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            margin: 20px 0;
        }
        
        .info-placeholder code {
            display: inline-block;
            background: #2d3748;
            color: #68d391;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            margin: 10px 0;
        }
        
        body.dark .info-placeholder code {
            background: #0f172a;
            color: #86efac;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html" class="home-btn">🏠 На главную</a>
    <div class="nav-links">
        <span class="active">Часть 1</span>

    <button class="theme-toggle" id="themeToggleBtn">🌙 Тёмная тема</button>
</div>

<div class="container">
    <h1>📜 История — Тест</h1>
    <p class="subtitle">Часть 1 • Вопросы 1–200 • Работа над ошибками</p>

    <div class="mode-switch">
        <button class="mode-btn active" id="mainModeBtn">📖 Все вопросы</button>
        <button class="mode-btn" id="mistakesModeBtn">⚠️ Работа над ошибками</button>
    </div>

    <div id="questions-container"></div>

    <div class="btn-group">
        <button class="btn btn-reset" id="resetBtn">🔄 Сбросить ответы</button>
    </div>
    <div class="result" id="global-result"></div>
</div>

<script>
// ============================================================
// ⬇️⬇️⬇️ СЮДА ВСТАВЬТЕ ВАШ МАССИВ ВОПРОСОВ (1–200) ⬇️⬇️⬇️
// ============================================================
// ФОРМАТ ОДНОГО ВОПРОСА:
// {"id":1,"q":"Текст вопроса","opts":["Вариант А","Вариант Б","Вариант В","Вариант Г"],"ans":0}
// 
// ГДЕ ans — НОМЕР ПРАВИЛЬНОГО ОТВЕТА (0, 1, 2 или 3)
// ============================================================

const questions = [
  {"id":1,"q":"Отцом истории называют историка","opts":["Плутарха","Птоломея","Страбона","Геродота"],"ans":3},
  {"id":2,"q":"История – это наука, которая изучает","opts":["эволюцию планеты","происхождение видов","первобытные верования людей","развитие человеческого общества"],"ans":3},
  {"id":3,"q":"Предметом истории выступает","opts":["изучение человеческого общества как единого противоречивого процесса","рассмотрение социальных процессов","анализ систем письма","изучение материальной культуры"],"ans":0},
  {"id":4,"q":"История России - это","opts":["научная дисциплина о природных особенностях страны","научная дисциплина, изучающая процесс развития нашего Отечества","научная дисциплина, изучающая верования людей","научная дисциплина, анализирующая философские концепции"],"ans":1},
  {"id":5,"q":"Исторический метод, выявляющий различия и сходство общественных явлений, называется:","opts":["ретроспективный","повествовательный","сравнительно-исторический","биографический"],"ans":2},
  {"id":6,"q":"Исторический источник – это","opts":["растительный мир планеты","полезные ископаемые земли","все предметы и вещи, которые нас окружают","сохранившиеся свидетельства прошлого, связанные с деятельностью человека"],"ans":3},
  {"id":7,"q":"К письменным историческим источникам относятся","opts":["эпиграфические документы","рукописи","документальные фильмы","фотоматериалы"],"ans":1},
  {"id":8,"q":"Укажите официальный письменный исторический источник","opts":["Праздник Ивана Купалы","Полное собрание законов Российской империи: «Собрание Первое 1649 — 1825 гг. (в 45 томах)»","Парсуна «Андрей Бесящий»","Былина «Илья Муромец и Соловей Разбойник»"],"ans":1},
  {"id":9,"q":"Историография – это","opts":["отрасль истории, изучающая историю через «призму» географии","отрасль исторической науки, изучающая ее историю","отрасль истории, изучающая хозяйственные процессы","отрасль истории, изучающая войны"],"ans":1},
  {"id":10,"q":"Последовательность исторических событий во времени называется","opts":["хронологией","летописью","датой","эпохой"],"ans":0},
  {"id":11,"q":"Принцип историзма предусматривает:","opts":["рассматривать цепь событий не как единственно возможную","стремление к максимально точному изображению исторической действительности","одновременное изучение событий в разных странах","субъективный фактор в историческом исследовании"],"ans":1},
  {"id":12,"q":"Изучением происхождения родов, семей, их родственными связями занимается","opts":["генеалогия","геральдика","этнография","сфрагистика"],"ans":0},
  {"id":13,"q":"Вспомогательная историческая дисциплина, занимающаяся изучением гербов, объяснением значения и истории появления символов – это","opts":["геральдика","нумизматика","сфрагистика","метрология"],"ans":0},
  {"id":14,"q":"Современное летоисчисление ведётся с даты","opts":["основания Москвы","сотворения мира","основания Рима","рождества Христова"],"ans":3},
  {"id":15,"q":"Мы живём по календарю","opts":["Юлианскому","Олимпийскому","Византийскому","Григорианскому"],"ans":3},
  {"id":16,"q":"Новейшая история изучает","opts":["период от доистории до средних веков","период после Античности","период между Средневековьем и Новым временем","период с 1918 года по нынешнее время"],"ans":3},
  {"id":17,"q":"«Эти племена... – писал Прокопий Кесарийский, – не управляются одним человеком, но издревле живут в народоправстве...» Назовите эти племена?","opts":["печенеги","вестготы","половцы","славяне"],"ans":3},
  {"id":18,"q":"В каком веке создана «Повесть временных лет»?","opts":["в XII в.","конец X","XI в.","XIII в."],"ans":0},
  {"id":19,"q":"Согласно «Повести временных лет» первым правителем Руси был викинг Рюрик. Он стал князем в Новгороде:","opts":["859 г.","862 г.","882 г.","890 г."],"ans":1},
  {"id":20,"q":"Рюрик был призван на княжение:","opts":["ильменскими словенами","полянами","радимичами","древлянами"],"ans":0},
  {"id":21,"q":"Язычеству не свойственно:","opts":["поклонение силам природы","идолопоклонство","наличие множества богов","единобожие"],"ans":3},
  {"id":22,"q":"Богом грома и молнии у славян был:","opts":["Сварог","Даждьбог","Перун","Велес"],"ans":2},
  {"id":23,"q":"Центрами образования государства Древняя Русь стали города:","opts":["Изборск и Белоозеро","Псков и Новгород","Киев и Новгород","Полоцк и Киев"],"ans":2},
  {"id":24,"q":"«Уроки» и «погосты» в Киевской Руси были установлены:","opts":["князем Олегом","князем Игорем","княгиней Ольгой","князем Владимиром"],"ans":2},
  {"id":25,"q":"Укажите событие, которое не относится ко времени правления Ярослава Мудрого:","opts":["строительство «Золотых ворот» в Киеве","заключение династических браков","принятие христианства","заключение военного союза с печенегами"],"ans":2},
  {"id":26,"q":"После смерти Рюрика Олег, правивший в Новгороде, объединил Новгород и Киев в:","opts":["862 г.","880 г.","882 г.","888 г."],"ans":2},
  {"id":27,"q":"Основоположниками норманнской теории стали:","opts":["М.В. Ломоносов и И.Н. Болтин","Г.З. Байер, Г.Ф. Миллер и А.Л. Шлецер","А. Токвиль и Ф. Куланж","Э. Гиббон и Г. Моно"],"ans":1},
  {"id":28,"q":"Наследником Олега стал:","opts":["Ярослав Мудрый","Игорь","Владимир I","Святослав"],"ans":1},
  {"id":29,"q":"В осуществлении своей власти князь опирался на:","opts":["дружину","вече","Земской собор","Сенат"],"ans":0},
  {"id":30,"q":"Древнерусское государство являлось:","opts":["восточной деспотией","раннефеодальной монархией","конституционной монархией","демократической республикой"],"ans":1},
  {"id":31,"q":"Термином Старцы градские в Киевской Руси называли:","opts":["родовых старейшин","племенных вождей","избираемых в систему городского самоуправления десятских, сотских, тысяцких","круг близких советников при дворе князя"],"ans":2},
  {"id":32,"q":"Разделение славян на южных, восточных и западных произошло:","opts":["уже ко времени установления хазарской власти над жителями Приднепровья в VIII в.","еще на начальном этапе Великого переселения народов (III в.)","лишь в XI в. после окончательного размежевания католиков и православных","в эпоху господства над Русью Золотой Орды"],"ans":0},
  {"id":33,"q":"Город Искоростень, упоминаемый летописцем, был столицей:","opts":["дреговичей","древлян","радимичей","вятичей"],"ans":1},
  {"id":34,"q":"К варяжскому конунгу Рюрику с просьбой возглавить объединение нескольких племен в 862 г., по свидетельству летописца, обратились:","opts":["словене ильменские, кривичи, чудь, весь и мерь","поляне, кривичи, уличи и тиверцы","поляне и древляне","словене ильменские, древляне и дреговичи"],"ans":0},
  {"id":35,"q":"С середины VIII в. приднепровские славяне были вынуждены подчиняться прочно обосновавшимся в степях Прикаспия и Причерноморья:","opts":["хазарам","черным болгарам","печенегам","торкам"],"ans":0},
  {"id":36,"q":"Начало городу Киеву дало племя:","opts":["полян","словен","радимичей","древлян"],"ans":0},
  {"id":37,"q":"Новгородские словене в VIII–IХ вв. группировались вокруг городов:","opts":["Псков и Архангельск","Ладога и Псков","Новгород и Ладога","Новгород и Изборск"],"ans":2},
  {"id":38,"q":"В IХ–Х вв. центром объединения русских земель становится:","opts":["Московское княжество","Тверское княжество","Киевское княжество","Новгородская земля"],"ans":2},
  {"id":39,"q":"Международное положение Киевской Руси с помощью династических браков укреплял князь:","opts":["Ярослав Мудрый","Владимир Мономах","Юрий Долгорукий","Андрей Боголюбский"],"ans":0},
  {"id":40,"q":"Укажите годы княжения Ярослава Мудрого:","opts":["980–1015 гг.","1019–1054 гг.","1113–1125 гг.","1147–1157 гг."],"ans":1},
  {"id":41,"q":"Первым из киевских князей принял титул князя всех князей (великого князя):","opts":["Рюрик","Олег","Игорь","Ярослав Мудрый"],"ans":1},
  {"id":42,"q":"Киевский князь Святослав Игоревич предполагал перенести столицу своей державы в завоёванный им город:","opts":["Итиль","Доростол","Белгород","Переяславец"],"ans":3},

            <code>// СЮДА ВСТАВЬТЕ ВАШ МАССИВ ВОПРОСОВ (1–200)</code><br><br>
            Формат одного вопроса:<br>
            <code>{ "id":1, "q":"Текст вопроса", "opts":["А","Б","В","Г"], "ans":0 }</code><br><br>
            <span style="font-size:14px;opacity:0.7;">После вставки вопросов страница заработает автоматически</span>
        </div>
    `;
    document.getElementById('global-result').innerHTML = '⏳ Ожидание загрузки вопросов...';
}

// ============================================================
// ЛОГИКА ТЕСТА И РАБОТЫ НАД ОШИБКАМИ (НЕ ТРОГАТЬ)
// ============================================================
let currentMode = 'main';
let mainAnswers = {};
let mainStates = {};
let mistakeAnswers = {};
let mistakeStates = {};
let mistakeQuestions = [];

function getMistakeQuestions() {
    const mistakeIndices = [];
    for (let i = 0; i < questions.length; i++) {
        if (mainStates[i] === 'incorrect') {
            mistakeIndices.push(i);
        }
    }
    return mistakeIndices.map(idx => ({ ...questions[idx], originalIndex: idx }));
}

function updateMistakeList() {
    mistakeQuestions = getMistakeQuestions();
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function render() {
    const container = document.getElementById('questions-container');
    const mainBtn = document.getElementById('mainModeBtn');
    const mistakesBtn = document.getElementById('mistakesModeBtn');
    
    if (isExampleOnly || questions.length === 0) return;
    
    if (currentMode === 'main') {
        mainBtn.classList.add('active');
        mistakesBtn.classList.remove('active');
        renderQuestions(questions, mainAnswers, mainStates, true);
        updateScore(mainStates, questions.length);
    } else {
        mainBtn.classList.remove('active');
        mistakesBtn.classList.add('active');
        if (mistakeQuestions.length === 0) {
            container.innerHTML = `<div class="empty-mistakes">
                🎉 Отлично! У вас нет ошибок. Все вопросы решены верно!<br>
                <button class="btn btn-reset" style="margin-top:16px;" onclick="document.getElementById('mainModeBtn').click()">Вернуться ко всем вопросам</button>
            </div>`;
            document.getElementById('global-result').innerHTML = '✅ Ошибок нет! Поздравляем.';
            return;
        }
        renderQuestions(mistakeQuestions, mistakeAnswers, mistakeStates, false);
        let correctCount = 0;
        for (let i = 0; i < mistakeQuestions.length; i++) {
            if (mistakeStates[i] === 'correct') correctCount++;
        }
        const total = mistakeQuestions.length;
        document.getElementById('global-result').innerHTML = `📘 Работа над ошибками: ${correctCount} из ${total} исправлено (${total ? Math.round(correctCount/total*100) : 0}%)`;
    }
}

function renderQuestions(qList, answersStore, statesStore, isMainMode) {
    const container = document.getElementById('questions-container');
    container.innerHTML = '';
    
    if (!qList.length) return;
    
    qList.forEach((item, idx) => {
        const optsCopy = [...item.opts];
        const correctOrig = item.ans;
        const shuffled = optsCopy.map((text, i) => ({ text, origIdx: i }));
        shuffleArray(shuffled);
        const newCorrect = shuffled.findIndex(o => o.origIdx === correctOrig);
        const letters = ['А', 'Б', 'В', 'Г'];
        const savedAnswer = answersStore[isMainMode ? idx : idx];
        
        const block = document.createElement('div');
        block.className = 'question-block';
        if (statesStore[isMainMode ? idx : idx] === 'correct') block.classList.add('correct');
        if (statesStore[isMainMode ? idx : idx] === 'incorrect') block.classList.add('incorrect');
        block.dataset.correct = newCorrect;
        block.dataset.qidx = idx;
        block.dataset.ismain = isMainMode;
        
        const displayNumber = isMainMode ? (item.id || idx + 1) : (item.originalIndex !== undefined ? item.originalIndex + 1 : idx + 1);
        
        let optionsHtml = '';
        shuffled.forEach((opt, oi) => {
            const isChecked = (savedAnswer === oi);
            optionsHtml += `
                <label class="option" data-qidx="${idx}" data-oidx="${oi}" data-ismain="${isMainMode}">
                    <input type="radio" name="q${idx}" value="${oi}" ${isChecked ? 'checked' : ''}>
                    <span class="option-letter">${letters[oi]}</span>
                    <span class="option-text">${escapeHtml(opt.text)}</span>
                </label>
            `;
        });
        
        block.innerHTML = `
            <div class="q-text"><span class="q-num">${displayNumber}.</span> ${escapeHtml(item.q)}</div>
            <div class="options">${optionsHtml}</div>
            <div class="feedback" id="fb-${isMainMode ? 'main' : 'mist'}-${idx}"></div>
        `;
        container.appendChild(block);
        
        if (savedAnswer !== undefined) {
            const fb = document.getElementById(`fb-${isMainMode ? 'main' : 'mist'}-${idx}`);
            const isCorrect = (savedAnswer === newCorrect);
            if (isCorrect) {
                fb.textContent = '✅ Правильно!';
                fb.className = 'feedback show correct-fb';
            } else {
                fb.textContent = '❌ Неправильно. Правильный ответ выделен зелёным.';
                fb.className = 'feedback show incorrect-fb';
                const correctLabel = block.querySelector(`.option[data-oidx="${newCorrect}"]`);
                if (correctLabel) correctLabel.classList.add('correct-highlight');
            }
            const selectedLabel = block.querySelector(`.option[data-oidx="${savedAnswer}"]`);
            if (selectedLabel) selectedLabel.classList.add('selected');
        }
    });
    
    document.querySelectorAll('.option').forEach(opt => {
        opt.removeEventListener('click', optionClickHandler);
        opt.addEventListener('click', optionClickHandler);
    });
}

function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function optionClickHandler(e) {
    const label = e.currentTarget;
    const qIdx = parseInt(label.dataset.qidx);
    const oIdx = parseInt(label.dataset.oidx);
    const isMain = label.dataset.ismain === 'true';
    
    const answers = isMain ? mainAnswers : mistakeAnswers;
    const states = isMain ? mainStates : mistakeStates;
    const block = label.closest('.question-block');
    const correctAns = parseInt(block.dataset.correct);
    
    answers[isMain ? qIdx : qIdx] = oIdx;
    const isCorrect = (oIdx === correctAns);
    states[isMain ? qIdx : qIdx] = isCorrect ? 'correct' : 'incorrect';
    
    const fb = document.getElementById(`fb-${isMain ? 'main' : 'mist'}-${qIdx}`);
    block.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected', 'correct-highlight'));
    label.classList.add('selected');
    
    if (isCorrect) {
        fb.textContent = '✅ Правильно!';
        fb.className = 'feedback show correct-fb';
        block.classList.add('correct');
        block.classList.remove('incorrect');
    } else {
        fb.textContent = '❌ Неправильно. Правильный ответ выделен зелёным.';
        fb.className = 'feedback show incorrect-fb';
        block.classList.add('incorrect');
        block.classList.remove('correct');
        const correctLabel = block.querySelector(`.option[data-oidx="${correctAns}"]`);
        if (correctLabel) correctLabel.classList.add('correct-highlight');
    }
    
    if (isMain) {
        updateMistakeList();
        if (currentMode === 'mistakes') {
            mistakeAnswers = {};
            mistakeStates = {};
            render();
        } else {
            updateScore(mainStates, questions.length);
        }
    } else {
        let correctCount = 0;
        for (let i = 0; i < mistakeQuestions.length; i++) {
            if (mistakeStates[i] === 'correct') correctCount++;
        }
        const total = mistakeQuestions.length;
        document.getElementById('global-result').innerHTML = `📘 Работа над ошибками: ${correctCount} из ${total} исправлено (${total ? Math.round(correctCount/total*100) : 0}%)`;
    }
}

function updateScore(states, total) {
    let correct = 0;
    for (let i = 0; i < total; i++) {
        if (states[i] === 'correct') correct++;
    }
    document.getElementById('global-result').innerHTML = `📊 Результат: ${correct} из ${total} (${Math.round(correct/total*100)}%)`;
}

function resetCurrentMode() {
    if (currentMode === 'main') {
        for (let k in mainAnswers) delete mainAnswers[k];
        for (let k in mainStates) delete mainStates[k];
        updateMistakeList();
        render();
    } else {
        for (let k in mistakeAnswers) delete mistakeAnswers[k];
        for (let k in mistakeStates) delete mistakeStates[k];
        render();
    }
}

// Кнопки (если они уже есть на странице)
const mainBtn = document.getElementById('mainModeBtn');
const mistakesBtn = document.getElementById('mistakesModeBtn');
const resetBtn = document.getElementById('resetBtn');

if (mainBtn) mainBtn.addEventListener('click', () => {
    currentMode = 'main';
    render();
});
if (mistakesBtn) mistakesBtn.addEventListener('click', () => {
    currentMode = 'mistakes';
    updateMistakeList();
    mistakeAnswers = {};
    mistakeStates = {};
    render();
});
if (resetBtn) resetBtn.addEventListener('click', resetCurrentMode);

// Тёмная тема
const themeToggle = document.getElementById('themeToggleBtn');
if (themeToggle) {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        themeToggle.textContent = '☀️ Светлая тема';
    } else {
        themeToggle.textContent = '🌙 Тёмная тема';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
    });
}

// Инициализация (только если есть реальные вопросы)
if (!isExampleOnly && questions.length > 0) {
    updateMistakeList();
    render();
}
</script>
</body>
</html>
